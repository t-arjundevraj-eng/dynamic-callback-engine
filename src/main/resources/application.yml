server:
  port: 8080

app:
  vendor-callback:
    enabled: true
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
    scheduler-pool-size: 20
    config-refresh-ms: 60000
    default-producer-sleep-ms: 1000
    dispatch-core-pool-size: 50
    dispatch-max-pool-size: 100
    dispatch-queue-capacity: 1000
  kafka:
    topic: high-throughput-events
    partitions: 48
    replicas: 1
    consumer-concurrency: 12
    consumer-batch-size: 500
  producer:
    core-pool-size: 50
    max-pool-size: 100
    queue-capacity: 1000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kafka_demo?rewriteBatchedStatements=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: #Okkewlad23
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      batch-size: 65536
      compression-type: lz4
      buffer-memory: 67108864
      properties:
        enable.idempotence: true
        linger.ms: 20
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
    consumer:
      group-id: mysql-writer-pool
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: org.example.messaging,java.util
        spring.json.value.default.type: org.example.messaging.TelemetryEvent
        fetch.min.bytes: 1048576
        fetch.max.wait.ms: 500
